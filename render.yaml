services:
  # 1. The Spring Boot Backend (Using Docker)
  - type: web
    name: smartevent-backend
    runtime: docker
    rootDir: backend
    envVars:
      - key: DB_URL
        fromDatabase:
          name: smartevent-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: smartevent-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smartevent-db
          property: password
      - key: OPENROUTER_API_KEY
        value: "PLACEHOLDER"
      - key: MAIL_USERNAME
        value: "PLACEHOLDER"
      - key: MAIL_PASSWORD
        value: "PLACEHOLDER"

  # 2. The React Frontend
  - type: web
    name: smartevent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: smartevent-db
    plan: free