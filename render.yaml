services:
  # 1. The Spring Boot Backend
  - type: web
    name: smartevent-backend
    env: java
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/eventai-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        fromDatabase:
          name: smartevent-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: smartevent-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smartevent-db
          property: password
      - key: OPENROUTER_API_KEY
        value: 'REPLACE_ME_IN_DASHBOARD'
      - key: MAIL_USERNAME
        value: 'REPLACE_ME_IN_DASHBOARD'
      - key: MAIL_PASSWORD
        value: 'REPLACE_ME_IN_DASHBOARD'

  # 2. The React Frontend
  - type: web
    name: smartevent-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: smartevent-db
    plan: free